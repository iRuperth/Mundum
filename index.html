<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b1030">
<title>Mundum</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%235fae54'/><circle cx='38' cy='42' r='15' fill='%232f86c9'/><circle cx='66' cy='64' r='11' fill='%23d5c382'/></svg>">
<link rel="stylesheet" href="./style.css">
<script type="importmap">{ "imports": { "three": "./vendor/three.module.min.js" } }</script>
</head>
<body>
<canvas id="game"></canvas>

<!-- HUD durante el juego -->
<div id="hud" class="hidden">
  <div id="hud-top">
    <div id="hud-title">MUNDUM</div>
    <div id="hud-clock"><span id="clock-icon">☀️</span> <span id="clock-time">--:--</span></div>
  </div>
  <div id="hint">Haz clic para capturar el ratón &nbsp;·&nbsp; WASD moverse &nbsp;·&nbsp; Espacio saltar &nbsp;·&nbsp; Shift correr &nbsp;·&nbsp; C cámara</div>
</div>

<!-- Controles en pantalla -->
<div id="controls-ui" class="hidden">
  <div id="stick-base"><div id="stick-knob"></div></div>
  <button id="btn-cam" class="round-btn" title="Cambiar cámara (C)">👁</button>
  <button id="btn-jump" class="round-btn touch-only" title="Saltar">⬆</button>
</div>

<!-- Pantalla de creación de personaje -->
<div id="creation">
  <div id="creation-card">
    <h1>MUNDUM</h1>
    <p class="subtitle">Crea tu personaje</p>
    <label class="field">Nombre
      <input id="name-input" maxlength="16" placeholder="Aventurero" autocomplete="off">
    </label>
    <div id="swatch-rows"></div>
    <button id="btn-play">▶ &nbsp;Jugar</button>
    <p class="tiny">Fase 1 · El mundo y tu personaje</p>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
