<!DOCTYPE html>
<html lang="es" id="html-root">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#0b1030">
<title>Mundum</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%235fae54'/><circle cx='38' cy='42' r='15' fill='%232f86c9'/><circle cx='66' cy='64' r='11' fill='%23d5c382'/></svg>">
<link rel="stylesheet" href="./style.css">
<script type="importmap">{ "imports": { "three": "./vendor/three.module.min.js" } }</script>
</head>
<body>
<canvas id="game"></canvas>
<div id="low-hp-vignette"></div>
<div id="fade-overlay"></div>
<div id="crosshair" class="hidden"></div>
<div id="interact-hint" class="hidden"></div>
<!-- Quest waypoint arrow: a screen-space pointer toward the active quest's
     destination, with the place name + distance. Hidden until there's a target
     and toggleable from the Quests panel. -->
<div id="quest-arrow" class="hidden"><span class="qa-arrow">➤</span><span class="qa-label"></span></div>
<div id="auth-root"></div>

<div id="hud" class="hidden">
  <div id="hud-top">
    <div id="hud-clock"><span id="clock-icon">☀️</span> <span id="clock-time">--:--</span></div>
    <div id="hud-event" class="hidden"></div>
  </div>

  <div id="quest-box" class="hidden"></div>
  <!-- Hotbar + a thin XP bar under it (Tibia-style). -->
  <div id="hotbar-wrap">
    <div id="hotbar"></div>
    <div class="bar xp" id="hotbar-xp"><div id="hotbar-xp-fill" class="fill"></div><span id="hotbar-xp-text" class="bar-text"></span></div>
  </div>
  <div id="hint"></div>
  <div id="toast-stack"></div>
</div>

<!-- LEFT panel: empty by default. Windows can be dragged here from the right. -->
<div id="side-panel-left" class="hidden side-panel side-left collapsed">
  <button id="panel-toggle-left" title="">›</button>
  <div id="windows-left" class="windows"></div>
</div>

<!-- Floating CIRCULAR minimap, pinned top-right of the screen (not in the side
     panel). Click it to open the full map overlay. -->
<div id="minimap-box" class="hidden">
  <canvas id="minimap" width="150" height="150" title="Click to expand"></canvas>
  <div id="coords"></div>
  <div id="city-name"></div>
</div>

<!-- RIGHT panel, Tibia order: vitals → equipment → a small button row.
     Container/dragged windows append after. -->
<div id="side-panel" class="hidden side-panel side-right">
  <button id="panel-toggle" title="">›</button>

  <div id="windows" class="windows">

    <!-- Vitals (HP / Mana) — between the map and equipment. Level is shown in the
         Skills window, not here. -->
    <div id="vitals">
      <div class="bar hp"><div id="hp-fill" class="fill"></div><span id="hp-text" class="bar-text"></span></div>
      <div class="bar mana"><div id="mana-fill" class="fill"></div><span id="mana-text" class="bar-text"></span></div>
    </div>

    <div class="win" id="win-equip" data-win="equip">
      <div class="win-head"><span class="win-grip">⠿</span><span class="win-title" data-i18n="equipment">Equipo</span><button class="win-collapse" title="">▾</button></div>
      <div class="win-body">
        <div id="paperdoll">
          <div class="slot" data-slot="amulet" title=""></div>
          <div class="slot" data-slot="helmet" title=""></div>
          <div class="slot" data-slot="bag" title=""></div>
          <div class="slot" data-slot="weapon" title=""></div>
          <div class="slot" data-slot="armor" title=""></div>
          <div class="slot" data-slot="shield" title=""></div>
          <div class="slot" data-slot="ring" title=""></div>
          <div class="slot" data-slot="legs" title=""></div>
          <div class="slot" data-slot="boots" title=""></div>
          <div class="slot" data-slot="extra" title=""></div>
        </div>
        <div id="cap-row"><span id="cap-icon"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V7a6 6 0 0 1 12 0v2"/><rect x="4" y="9" width="16" height="11" rx="2.5"/></svg></span> <span id="cap-text"></span></div>
      </div>
    </div>

    <!-- Open container windows (backpack and any bags) are appended here. -->
  </div>

  <!-- Tibia-style button box: a grid of small SIMPLE-SYMBOL buttons (no emojis). -->
  <div id="panel-btns">
    <button id="btn-skills" class="panel-btn" title="Skills">≡</button>
    <button id="btn-spells" class="panel-btn" title="Hechizos">✦</button>
    <button id="btn-wiki" class="panel-btn" title="Wiki">?</button>
    <!-- Hotkeys config: toggles keybind edit mode on the hotbar (click a slot's
         key badge, then press the key you want). A simple monochrome keyboard. -->
    <button id="btn-hotkeys" class="panel-btn" title="Teclas"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="6" width="19" height="12" rx="2"/><path d="M6 9.5h0M9.5 9.5h0M13 9.5h0M16.5 9.5h0M6 13h0M18 9.5h0M8 16h8"/></svg></button>
    <!-- Mounts: a hand-drawn monochrome HORSE HEAD (chess-knight-style) glyph,
         the clearest "mount" symbol at small size. Matches the line-icon look of
         the other panel buttons. -->
    <button id="btn-mounts" class="panel-btn" title="Monturas"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"><path d="M7 21h11c.4-3.2-.2-6.1-1.7-8.6-1.3-2.2-2-4-2-5.7 0-1.3.5-2.4 1.4-3.4-1.9.1-3.4.8-4.5 2-.5-.7-.8-1.5-.8-2.5-1.6 1-2.6 2.5-3 4.4l-2.5 2c-.6.5-.7 1.2-.3 1.9.3.5.9.7 1.5.5l1.6-.5c-.6 1.1-1.5 2-2.7 2.8-1.3.9-2 1.8-2 3 0 .6.2 1.1.7 1.5.6.5 1.4.6 2.3.4-.1.8-.1 1.4 0 2z" fill="currentColor" stroke="none"/><circle cx="9.2" cy="8.2" r=".9" fill="#0b1020" stroke="none"/></svg></button>
    <button id="btn-cam" class="panel-btn" title="Cámara">◉</button>
    <button id="btn-range" class="panel-btn" title="Rango">⊕</button>
    <button id="hud-mute" class="panel-btn" title="Sonido">♪̸</button>
    <!-- Toggle the on-screen mobile controls (joystick + buttons) on/off. An SVG
         phone glyph guarantees a monochrome icon (never a colour emoji). -->
    <button id="btn-touch" class="panel-btn" title="Modo móvil"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><line x1="11" y1="18.5" x2="13" y2="18.5" stroke-linecap="round"/></svg></button>
  </div>
</div>

<!-- Touch-only on-screen controls (joystick + action buttons). Camera/range
     toggles now live in the right panel's button box. -->
<div id="controls-ui" class="hidden">
  <div id="stick-base"><div id="stick-knob"></div></div>
  <!-- Monochrome SVG glyphs (not emoji): crossed swords, up chevron, backpack. -->
  <button id="btn-attack" class="round-btn touch-only" title="Atacar"><svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 14.5 21 21M19 3l-9 9M3 19l9-9M5 3l9 9M9.5 14.5 3 21"/></svg></button>
  <button id="btn-jump" class="round-btn touch-only" title="Saltar"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6M6 12l6-6 6 6"/></svg></button>
  <button id="btn-bag" class="round-btn touch-only" title="Mochila"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V7a6 6 0 0 1 12 0v2"/><rect x="4" y="9" width="16" height="11" rx="2.5"/><path d="M9.5 13h5"/></svg></button>
  <!-- INTERACT (NPCs, doors, shops, depot, portals, stalls). Hidden until something
       interactable is in range (toggled by updateInteractHint). A speech-bubble glyph. -->
  <button id="btn-interact" class="round-btn touch-only hidden" title="Interactuar"><svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>
  <!-- CHAT: opens the chat input (touch players have no Enter key). A small chat icon. -->
  <button id="btn-chat" class="round-btn round-btn-sm touch-only" title="Chat"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
</div>

<div id="chat" class="hidden">
  <div id="chat-log"></div>
  <input id="chat-input" maxlength="160" autocomplete="off" class="hidden">
</div>

<div id="map-overlay" class="hidden">
  <canvas id="bigmap" width="600" height="600"></canvas>
  <div id="bigmap-coords"></div>
  <div id="bigmap-hint">Drag to move · scroll / pinch to zoom</div>
  <button id="bigmap-recenter" title="Recenter on player">⌖</button>
  <button id="bigmap-close" title="Close">✕</button>
</div>

<div id="context-card" class="hidden"></div>

<div id="creation">
  <div id="creation-card">
    <h1>MUNDUM</h1>
    <p class="subtitle" data-i18n="createHero"></p>
    <label class="field" data-i18n-label="name">
      <input id="name-input" maxlength="16" autocomplete="off">
    </label>
    <div class="seg-row">
      <div class="seg seg-prof" id="prof-seg">
        <button data-prof="knight" class="selected" data-i18n="profKnight"></button>
        <button data-prof="mage" data-i18n="profMage"></button>
        <button data-prof="paladin" data-i18n="profPaladin"></button>
        <button data-prof="druid" data-i18n="profDruid"></button>
      </div>
    </div>
    <p id="prof-desc" class="prof-desc"></p>
    <div class="seg-row">
      <div class="seg" id="sex-seg">
        <button data-sex="male" class="selected" data-i18n="male"></button>
        <button data-sex="female" data-i18n="female"></button>
      </div>
    </div>
    <div class="seg-row">
      <div class="seg" id="hair-seg">
        <button data-hair="short" class="selected" data-i18n="hairShort"></button>
        <button data-hair="long" data-i18n="hairLong"></button>
        <button data-hair="spiky" data-i18n="hairSpiky"></button>
        <button data-hair="bald" data-i18n="hairBald"></button>
      </div>
    </div>
    <div class="seg-row">
      <div class="seg" id="nose-seg">
        <button data-nose="small" class="selected" data-i18n="noseSmall"></button>
        <button data-nose="round" data-i18n="noseRound"></button>
        <button data-nose="pointy" data-i18n="nosePointy"></button>
      </div>
    </div>
    <div class="seg-row">
      <div class="seg" id="mouth-seg">
        <button data-mouth="smile" class="selected" data-i18n="mouthSmile"></button>
        <button data-mouth="neutral" data-i18n="mouthNeutral"></button>
        <button data-mouth="open" data-i18n="mouthOpen"></button>
      </div>
    </div>
    <div id="swatch-rows"></div>
    <button id="btn-play">▶ &nbsp;<span data-i18n="play"></span></button>
    <div id="lang-row">
      <button data-lang="es" class="lang-btn">ES</button>
      <button data-lang="en" class="lang-btn">EN</button>
    </div>
    <p class="tiny" data-i18n="phaseTag"></p>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
