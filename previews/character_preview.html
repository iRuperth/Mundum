<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<script src="../freshreg.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Character Preview — Mundum</title>
<script type="importmap">{ "imports": { "three": "../vendor/three.module.min.js" } }</script>
<style>
  html, body { margin: 0; height: 100%; background: #1d2228; color: #e7ecf2; font: 14px system-ui, sans-serif; }
  #app { display: flex; height: 100%; }
  #stage { flex: 1; position: relative; }
  #name { position: absolute; left: 14px; top: 12px; font-size: 15px; font-weight: 700; text-shadow: 0 1px 3px #000; }
  #panel { width: 290px; padding: 12px 14px; overflow-y: auto; background: #252b33; box-shadow: -2px 0 8px rgba(0,0,0,.4); }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: #9fb0c2; margin: 14px 0 6px; }
  h2:first-child { margin-top: 0; }
  button { display: block; width: 100%; text-align: left; margin: 2px 0; padding: 5px 8px; border: 1px solid #3a434d;
           background: #2e353e; color: #e7ecf2; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #38414b; }
  button.on { background: #3b6ea5; border-color: #5a90c8; }
  .row { display: flex; gap: 6px; flex-wrap: wrap; }
  .row button { flex: 1; }
  select { width: 100%; margin: 2px 0; padding: 5px; background: #2e353e; color: #e7ecf2; border: 1px solid #3a434d; border-radius: 6px; }
</style>
</head>
<body>
<div id="app">
  <div id="stage"><div id="name"></div></div>
  <div id="panel"></div>
</div>
<script type="module">
import * as THREE from 'three';
import { buildCharacter } from '../src/character.js';
import { EquipVisuals } from '../src/equipVisuals.js';
import { WEAPONS, ARMORS, CONTAINERS, rollWeaponInstance } from '../src/data/items.js';
import { instanceFromArmor, instanceFromContainer } from '../src/inventory.js';

// --- scene ---------------------------------------------------------------
const stage = document.getElementById('stage');
const nameEl = document.getElementById('name');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(stage.clientWidth, stage.clientHeight);
renderer.setPixelRatio(devicePixelRatio);
stage.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1d2228);
const camera = new THREE.PerspectiveCamera(38, stage.clientWidth / stage.clientHeight, 0.1, 50);
camera.position.set(0, 1.3, 3.6);
camera.lookAt(0, 1.0, 0);
scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x30343c, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 1.3); key.position.set(2, 4, 3); scene.add(key);
const floor = new THREE.Mesh(new THREE.CircleGeometry(2.4, 32), new THREE.MeshLambertMaterial({ color: 0x2a3038 }));
floor.rotation.x = -Math.PI / 2; floor.position.y = 0.0; scene.add(floor);
const grid = new THREE.GridHelper(6, 6, 0x4a5560, 0x394149); grid.position.y = 0.01; scene.add(grid);

const root = new THREE.Group(); scene.add(root);

const profile = { colors: { skin: '#f2c79b', shirt: '#3498db', pants: '#34495e', hair: '#4a2f1b' }, sex: 'male', hair: 'short', nose: 'small', mouth: 'smile' };
let char, ev;
const equip = { weapon: null, helmet: null, armor: null, legs: null, boots: null, shield: null, bag: null, amulet: null };

function rebuild() {
  if (char) { root.remove(char.group); char.group.traverse(o => { o.geometry?.dispose?.(); o.material?.dispose?.(); }); }
  char = buildCharacter(profile);
  root.add(char.group);
  ev = new EquipVisuals(char);
  ev.refresh(equip, 60);
}
rebuild();

// --- animation state -----------------------------------------------------
let spinning = true, walking = false, jumping = false, attackLoop = false;
let t = 0, jumpT = 0, attackTimer = 0;

// --- UI ------------------------------------------------------------------
const panel = document.getElementById('panel');
function section(title) { const h = document.createElement('h2'); h.textContent = title; panel.appendChild(h); }
function btn(label, onClick, parent) { const b = document.createElement('button'); b.textContent = label; b.onclick = onClick; (parent || panel).appendChild(b); return b; }

section('Animación');
const r1 = document.createElement('div'); r1.className = 'row'; panel.appendChild(r1);
const bSpin = btn('girar', () => { spinning = !spinning; bSpin.classList.toggle('on', spinning); }, r1);
const bWalk = btn('caminar', () => { walking = !walking; bWalk.classList.toggle('on', walking); }, r1);
const bJump = btn('saltar', () => { jumping = !jumping; bJump.classList.toggle('on', jumping); }, r1);
const bAtk = btn('atacar', () => { attackLoop = !attackLoop; bAtk.classList.toggle('on', attackLoop); }, r1);
bSpin.classList.add('on');

section('Sexo');
const r2 = document.createElement('div'); r2.className = 'row'; panel.appendChild(r2);
btn('hombre', () => { profile.sex = 'male'; rebuild(); }, r2);
btn('mujer', () => { profile.sex = 'female'; rebuild(); }, r2);

// Equip pickers: a dropdown per slot.
function picker(title, slot, defs, makeInst, label) {
  section(title);
  const sel = document.createElement('select');
  const none = document.createElement('option'); none.value = ''; none.textContent = '— ninguno —'; sel.appendChild(none);
  for (const d of defs) {
    const o = document.createElement('option'); o.value = d.id; o.textContent = label(d); sel.appendChild(o);
  }
  sel.onchange = () => {
    const d = defs.find(x => x.id === sel.value);
    equip[slot] = d ? makeInst(d) : null;
    ev.refresh(equip, 60);
  };
  panel.appendChild(sel);
}

const wlabel = (w) => `${w.name} (${w.type}, lv${w.levelReq})`;
picker('Arma', 'weapon', WEAPONS.filter(w => w.type !== 'shield'), (w) => rollWeaponInstance(w.id, () => 0.5), wlabel);
picker('Escudo', 'shield', WEAPONS.filter(w => w.type === 'shield'), (s) => rollWeaponInstance(s.id, () => 0.5), (s) => `${s.name} (lv${s.levelReq})`);
picker('Casco', 'helmet', ARMORS.filter(a => a.slot === 'helmet'), instanceFromArmor, (a) => a.name);
picker('Armadura', 'armor', ARMORS.filter(a => a.slot === 'armor'), instanceFromArmor, (a) => a.name);
picker('Piernas', 'legs', ARMORS.filter(a => a.slot === 'legs'), instanceFromArmor, (a) => a.name);
picker('Botas', 'boots', ARMORS.filter(a => a.slot === 'boots'), instanceFromArmor, (a) => a.name);
picker('Amuleto', 'amulet', ARMORS.filter(a => a.slot === 'amulet'), instanceFromArmor, (a) => a.name);
picker('Mochila/Bolsa', 'bag', CONTAINERS, instanceFromContainer, (c) => c.name);

// Deep-link: #armor=demon_armor  (optionally &legs=…&helmet=…&angle=2.6&sex=female)
// so a specific loadout can be opened/screenshotted directly. angle freezes spin.
{
  const hp = new URLSearchParams((location.hash || '').replace(/^#/, ''));
  if ([...hp.keys()].length) {
    if (hp.get('sex')) profile.sex = hp.get('sex');
    rebuild();
    for (const slot of ['armor', 'legs', 'boots', 'helmet', 'amulet']) {
      const id = hp.get(slot); if (!id) continue;
      const a = ARMORS.find(x => x.id === id); if (a) equip[slot] = instanceFromArmor(a);
    }
    for (const slot of ['weapon', 'shield']) {
      const id = hp.get(slot); if (!id) continue;
      const w = WEAPONS.find(x => x.id === id); if (w) equip[slot] = rollWeaponInstance(w.id, () => 0.5);
    }
    ev.refresh(equip, 60);
    const ang = parseFloat(hp.get('angle'));
    if (!isNaN(ang)) { spinning = false; root.rotation.y = ang; }
  }
}

// A quick "full set" demo button.
section('Demo');
btn('equipo completo (knight)', () => {
  const set = { weapon: 'knight_sword', shield: 'steel_shield', helmet: 'steel_helmet', armor: 'steel_armor', legs: 'steel_legs', boots: 'steel_boots', amulet: 'gold_amulet', bag: 'backpack' };
  for (const [slot, id] of Object.entries(set)) {
    if (slot === 'weapon' || slot === 'shield') { const w = WEAPONS.find(x => x.id === id); equip[slot] = w ? rollWeaponInstance(w.id, () => 0.5) : null; }
    else if (slot === 'bag') { const c = CONTAINERS.find(x => x.id === id); equip[slot] = c ? instanceFromContainer(c) : null; }
    else { const a = ARMORS.find(x => x.id === id); equip[slot] = a ? instanceFromArmor(a) : null; }
  }
  ev.refresh(equip, 60);
}, panel);

// --- loop ----------------------------------------------------------------
let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  t += dt;
  if (spinning) root.rotation.y += 0.01;

  const intensity = walking ? 1 : 0;
  const phase = t * (walking ? 8 : 2);
  let grounded = true;
  if (jumping) {
    jumpT += dt * 1.4;
    const y = Math.max(0, Math.sin(jumpT) ) * 0.7;
    root.position.y = y;
    grounded = y < 0.02;
  } else { root.position.y = 0; jumpT = 0; }

  char.animate(phase, intensity, grounded, dt);
  if (attackLoop) {
    attackTimer -= dt;
    if (attackTimer <= 0) { char.triggerAttack(); attackTimer = 1.1; }
  }
  char.updateAttack(dt);
  renderer.render(scene, camera);
  nameEl.textContent = `${profile.sex === 'female' ? 'Mujer' : 'Hombre'}`
    + (equip.weapon ? ` · ${equip.weapon.name}` : '')
    + (equip.shield ? ` + ${equip.shield.name}` : '');
}
requestAnimationFrame(frame);
addEventListener('resize', () => {
  renderer.setSize(stage.clientWidth, stage.clientHeight);
  camera.aspect = stage.clientWidth / stage.clientHeight; camera.updateProjectionMatrix();
});
</script>
</body>
</html>
