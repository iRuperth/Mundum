<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mounts Preview — Mundum</title>
<script type="importmap">{ "imports": { "three": "../vendor/three.module.min.js" } }</script>
<style>
  html, body { margin: 0; height: 100%; background: #1d2228; color: #e7ecf2; font: 14px system-ui, sans-serif; }
  #app { display: flex; height: 100%; }
  #stage { flex: 1; position: relative; }
  #name { position: absolute; left: 14px; top: 12px; font-size: 18px; font-weight: 700; text-shadow: 0 1px 3px #000; }
  #sub  { position: absolute; left: 14px; top: 38px; font-size: 13px; opacity: .8; text-shadow: 0 1px 3px #000; max-width: 70%; }
  #panel { width: 260px; padding: 12px 14px; overflow-y: auto; background: #252b33; box-shadow: -2px 0 8px rgba(0,0,0,.4); }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: #9fb0c2; margin: 14px 0 6px; }
  h2:first-child { margin-top: 0; }
  button { display: block; width: 100%; text-align: left; margin: 2px 0; padding: 6px 8px; border: 1px solid #3a434d;
           background: #2e353e; color: #e7ecf2; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #38414b; }
  button.on { background: #3b6ea5; border-color: #5a90c8; }
  button .lv { float: right; opacity: .65; font-size: 11px; }
  .row { display: flex; gap: 6px; }
  .row button { flex: 1; text-align: center; }
  .tag-shop { color: #f1c40f; } .tag-quest { color: #6fd1a0; }
</style>
</head>
<body>
<div id="app">
  <div id="stage"><div id="name"></div><div id="sub"></div></div>
  <div id="panel"></div>
</div>
<script type="module">
import * as THREE from 'three';
import '../src/creatureDesigns.js';        // registers the authored designs
import '../src/creatureDesignsExtra.js';   // vermin + dragons
import '../src/mountDesigns.js';           // mount + tiger + ice-dragon designs
import { buildCreatureModel } from '../src/creatureModels.js';
import { buildCharacter } from '../src/character.js';
import { MOUNTS } from '../src/data/mounts.js';
import { seatFromBox } from '../src/mountSystem.js';

// A default rider profile (so the preview seats a hero on every mount).
const RIDER_PROFILE = {
  colors: { skin: '#f2c79b', shirt: '#c0392b', pants: '#2c3e50', hair: '#3a2415' },
  sex: 'male', hair: 'short', nose: 'small', mouth: 'smile', eyes: 'normal', brows: 'normal', ears: 'normal',
};

// --- scene ---------------------------------------------------------------
const stage = document.getElementById('stage');
const nameEl = document.getElementById('name');
const subEl = document.getElementById('sub');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(stage.clientWidth, stage.clientHeight);
renderer.setPixelRatio(devicePixelRatio);
stage.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1d2228);
const camera = new THREE.PerspectiveCamera(40, stage.clientWidth / stage.clientHeight, 0.1, 60);
camera.position.set(0, 1.6, 4.2);
camera.lookAt(0, 0.9, 0);
scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x30343c, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 1.3); key.position.set(2, 4, 3); scene.add(key);
const fill = new THREE.DirectionalLight(0x9fc0ff, 0.5); fill.position.set(-3, 2, -2); scene.add(fill);
const floor = new THREE.Mesh(new THREE.CircleGeometry(7, 40), new THREE.MeshLambertMaterial({ color: 0x2a3038 }));
floor.rotation.x = -Math.PI / 2; scene.add(floor);
const grid = new THREE.GridHelper(14, 14, 0x4a5560, 0x394149); grid.position.y = 0.01; scene.add(grid);

const root = new THREE.Group(); scene.add(root);

let mountModel = null, rider = null, spinning = true, moving = true, current = MOUNTS[0].id, riderOn = true;
let walkPhase = 0, riderSeatY = 0;

function build(id) {
  const def = MOUNTS.find((m) => m.id === id);
  if (!def) return;
  current = id;
  // tear down the previous mount + rider
  if (mountModel) { root.remove(mountModel.group); mountModel.dispose && mountModel.dispose(); mountModel = null; }
  if (rider) { root.remove(rider.group); rider = null; }

  // mount model (uses the design's color/scale unless overridden by the catalog)
  mountModel = buildCreatureModel(def.family, { color: def.color, scale: def.scale });
  root.add(mountModel.group);

  // rider on the saddle: seat height measured from the mount's bbox (same logic
  // as the in-game MountSystem), scaled per the catalog. setSeated() puts the
  // hero in the straddle pose instead of standing.
  rider = buildCharacter(RIDER_PROFILE);
  rider.group.scale.setScalar(def.riderScale || 0.9);
  if (rider.setSeated) rider.setSeated(true);
  riderSeatY = def.riderY != null ? def.riderY : seatFromBox(mountModel.group, def.seatFrac);
  rider.group.position.set(0, riderSeatY, 0);
  rider.group.visible = riderOn;
  root.add(rider.group);

  // frame the camera to the whole pile (mount + rider) — a low 3/4 hero angle so
  // the mount reads side-on (long body, legs) instead of a stubby top-down view.
  const box = new THREE.Box3().setFromObject(root);
  const h = (box.max.y - box.min.y) || 1.5;
  const dist = Math.max(3.6, h * 2.1);
  camera.position.set(dist * 0.55, h * 0.42, dist * 0.95);
  camera.lookAt(0, h * 0.42, 0);

  const src = def.source === 'shop'
    ? `<span class="tag-shop">Tienda · ${def.cost} oro</span>`
    : `<span class="tag-quest">Gesta · nivel ${def.levelReq}</span>`;
  nameEl.textContent = def.name.es;
  subEl.innerHTML = `+30% velocidad · +30% salto &nbsp;|&nbsp; ${src}`;
  markActive();
}

// --- UI ------------------------------------------------------------------
const panel = document.getElementById('panel');
function section(title) { const h = document.createElement('h2'); h.textContent = title; panel.appendChild(h); }
function btn(label, onClick, parent) { const b = document.createElement('button'); b.innerHTML = label; b.onclick = onClick; (parent || panel).appendChild(b); return b; }

section('Vista');
const r1 = document.createElement('div'); r1.className = 'row'; panel.appendChild(r1);
btn('girar', () => { spinning = !spinning; }, r1);
btn('caminar', () => { moving = !moving; }, r1);
btn('jinete on/off', () => { riderOn = !riderOn; if (rider) rider.group.visible = riderOn; });

section('Monturas de tienda');
const shopBtns = {};
for (const m of MOUNTS.filter((x) => x.source === 'shop')) shopBtns[m.id] = btn(`${m.name.es}<span class="lv">${m.cost} 💰</span>`, () => build(m.id));

section('Monturas de gesta');
const questBtns = {};
for (const m of MOUNTS.filter((x) => x.source === 'quest')) questBtns[m.id] = btn(`${m.name.es}<span class="lv">nv ${m.levelReq}</span>`, () => build(m.id));

const allBtns = { ...shopBtns, ...questBtns };
function markActive() { for (const id in allBtns) allBtns[id].classList.toggle('on', id === current); }

// Allow ?#mountId so a specific mount can be deep-linked (used by previews/tests).
const startId = (location.hash || '').replace('#', '');
build(MOUNTS.some((m) => m.id === startId) ? startId : MOUNTS[0].id);

// --- loop ----------------------------------------------------------------
let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  if (spinning) root.rotation.y += 0.008;
  if (mountModel) mountModel.update(dt, moving);
  // The seated hero rides ALONG with the mount: keep the static seated pose but
  // add the mount's live body bob/lunge (model.bob) so they move together.
  if (rider) {
    rider.animate(0, 0, true, dt);   // seated pose (setSeated already true)
    const b = mountModel && mountModel.bob;
    rider.group.position.set(b ? b.z : 0, riderSeatY + (b ? b.y : 0), 0);
  }
  renderer.render(scene, camera);
}
requestAnimationFrame(frame);

addEventListener('resize', () => {
  renderer.setSize(stage.clientWidth, stage.clientHeight);
  camera.aspect = stage.clientWidth / stage.clientHeight; camera.updateProjectionMatrix();
});
</script>
</body>
</html>
