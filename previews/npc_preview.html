<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<script src="../freshreg.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>NPC Preview — Mundum</title>
<script type="importmap">{ "imports": { "three": "../vendor/three.module.min.js" } }</script>
<style>
  html, body { margin: 0; height: 100%; background: #1d2228; color: #e7ecf2; font: 14px system-ui, sans-serif; }
  #app { display: flex; height: 100%; }
  #stage { flex: 1; position: relative; }
  #name { position: absolute; left: 14px; top: 12px; font-size: 16px; font-weight: 700; text-shadow: 0 1px 3px #000; line-height: 1.4; }
  #name small { font-weight: 400; color: #9fb0c2; }
  #panel { width: 270px; padding: 12px 14px; overflow-y: auto; background: #252b33; box-shadow: -2px 0 8px rgba(0,0,0,.4); }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; color: #9fb0c2; margin: 14px 0 6px; }
  h2:first-child { margin-top: 0; }
  button { display: block; width: 100%; text-align: left; margin: 2px 0; padding: 5px 8px; border: 1px solid #3a434d;
           background: #2e353e; color: #e7ecf2; border-radius: 6px; cursor: pointer; font-size: 13px; }
  button:hover { background: #38414b; }
  button.on { background: #3b6ea5; border-color: #5a90c8; }
  .row { display: flex; gap: 6px; }
  .row button { flex: 1; }
</style>
</head>
<body>
<div id="app">
  <div id="stage"><div id="name"></div></div>
  <div id="panel"></div>
</div>
<script type="module">
import * as THREE from 'three';
import { buildNpcModel, NPC_MODEL_KEYS } from '../src/npcModels.js';
import { NPCS } from '../src/data/npcs.js';
import { lookForNpc } from '../src/worldNpcs.js';

// --- scene ---------------------------------------------------------------
const stage = document.getElementById('stage');
const nameEl = document.getElementById('name');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(stage.clientWidth, stage.clientHeight);
renderer.setPixelRatio(devicePixelRatio);
stage.appendChild(renderer.domElement);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1d2228);
const camera = new THREE.PerspectiveCamera(40, stage.clientWidth / stage.clientHeight, 0.1, 50);
camera.position.set(0, 1.1, 3.2);
camera.lookAt(0, 0.9, 0);
scene.add(new THREE.HemisphereLight(0xcfe8ff, 0x30343c, 1.0));
const key = new THREE.DirectionalLight(0xffffff, 1.3); key.position.set(2, 4, 3); scene.add(key);
const floor = new THREE.Mesh(new THREE.CircleGeometry(3, 32), new THREE.MeshLambertMaterial({ color: 0x2a3038 }));
floor.rotation.x = -Math.PI / 2; scene.add(floor);
const grid = new THREE.GridHelper(8, 8, 0x4a5560, 0x394149); grid.position.y = 0.01; scene.add(grid);

const root = new THREE.Group(); scene.add(root);
let model = null, spinning = true, moving = false, current = null;

// Distinct colours per role so vendor variants don't all look the same.
function buildModel(modelKey, color, label, look) {
  if (model) { root.remove(model.group); model.dispose(); }
  const opts = {};
  if (color != null) opts.color = color;
  if (look) opts.look = look;
  model = buildNpcModel(modelKey, opts);
  root.add(model.group);
  nameEl.innerHTML = label;
  current = label;
}

// --- UI ------------------------------------------------------------------
const panel = document.getElementById('panel');
function section(title) { const h = document.createElement('h2'); h.textContent = title; panel.appendChild(h); }
function btn(label, onClick, parent) { const b = document.createElement('button'); b.textContent = label; b.onclick = onClick; (parent || panel).appendChild(b); return b; }

section('Vista');
const r1 = document.createElement('div'); r1.className = 'row'; panel.appendChild(r1);
btn('girar', () => { spinning = !spinning; }, r1);
btn('caminar', () => { moving = !moving; }, r1);

// Base model archetypes.
section('Modelos base (' + NPC_MODEL_KEYS.length + ')');
for (const k of NPC_MODEL_KEYS) {
  btn(k, () => buildModel(k, null, `${k} <small>(modelo base)</small>`));
}

// Actual NPCs from the data, so you see them with their real colours/roles.
section('NPCs del juego (' + NPCS.length + ')');
for (const n of NPCS) {
  btn(`${n.name}  ·  ${n.role}`, () => buildModel(n.model, n.color,
    `${n.name} <small>(${n.role} · ${n.city || '—'})</small><br><small>modelo: ${n.model}</small>`, lookForNpc(n)));
}

// start on the first base model
buildModel(NPC_MODEL_KEYS[0], null, `${NPC_MODEL_KEYS[0]} <small>(modelo base)</small>`);

// --- loop ----------------------------------------------------------------
let last = performance.now();
function frame(now) {
  requestAnimationFrame(frame);
  const dt = Math.min(0.05, (now - last) / 1000); last = now;
  if (spinning) root.rotation.y += 0.01;
  if (model) model.update(dt, moving);
  renderer.render(scene, camera);
}
requestAnimationFrame(frame);
addEventListener('resize', () => {
  renderer.setSize(stage.clientWidth, stage.clientHeight);
  camera.aspect = stage.clientWidth / stage.clientHeight; camera.updateProjectionMatrix();
});
</script>
</body>
</html>
